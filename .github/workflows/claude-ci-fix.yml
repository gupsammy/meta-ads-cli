name: Claude CI Fix

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  fix-ci:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup git identity
        run: |
          git config --global user.email "claude[bot]@users.noreply.github.com"
          git config --global user.name "claude[bot]"

      - name: Get CI failure details
        id: failure_details
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id
            });
            const failedJobs = jobs.data.jobs.filter(j => j.conclusion === 'failure');
            let logs = [];
            for (const job of failedJobs) {
              const log = await github.rest.actions.downloadJobLogsForWorkflowRun({
                owner: context.repo.owner, repo: context.repo.repo, job_id: job.id
              });
              logs.push({ jobName: job.name, logs: log.data.slice(-50000) });
            }
            return { failedJobs: failedJobs.map(j => j.name), logs };

      - name: Fix CI failures with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            CI failed on branch `${{ github.event.workflow_run.head_branch }}`.

            Failed jobs: ${{ join(fromJSON(steps.failure_details.outputs.result).failedJobs, ', ') }}
            Error logs: ${{ toJSON(fromJSON(steps.failure_details.outputs.result).logs) }}

            This is a TypeScript CLI project (meta-ads-cli) using pnpm, tsup, vitest,
            and eslint. The CI pipeline runs: typecheck, lint, build, test across
            Node 20/22 on ubuntu/macos/windows.

            Instructions:
            1. Read the error logs carefully to identify the root cause.
            2. Read CLAUDE.md for project conventions.
            3. Fix the issue in the source code. Common failures:
               - TypeScript type errors: check src/ files, fix types.
               - Lint errors: fix the lint violation, do not disable the rule.
               - Test failures: read the failing test AND the source code it tests.
                 Fix the source code if the test expectations are correct, or fix the
                 test if the source behavior is intentionally changed.
               - Build failures: check tsup config and imports.
            4. Run the relevant check locally to verify your fix:
               `pnpm install && pnpm typecheck && pnpm lint && pnpm build && pnpm test`
            5. Commit the fix with a clear message explaining what broke and why.
            6. Create a PR targeting the failed branch with the fix.
          claude_args: >-
            --allowedTools "Edit,Write,Read,Glob,Grep,Bash(git:*),Bash(gh:*),Bash(pnpm:*),Bash(node:*)"
