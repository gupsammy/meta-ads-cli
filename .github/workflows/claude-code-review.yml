name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            You are reviewing a PR for meta-ads-cli, a TypeScript CLI (Node.js >=20, ESM)
            that wraps the Meta Marketing API v21.0. It uses Commander.js for command
            registration, tsup for builds, vitest + nock for testing, and eslint +
            typescript-eslint for linting.

            ## Phase 1 — Context Discovery

            1. Read CLAUDE.md for project conventions and non-obvious behaviors.
            2. Read package.json to confirm dependencies.
            3. Run `gh pr diff` to get the full diff.
            4. Categorize changed files: source (src/), tests (src/__tests__/),
               config, CI (.github/), docs, skills (skills/).

            ## Phase 2 — Change Comprehension

            1. Summarize the PR's intent in one sentence.
            2. Read surrounding code — not just the diff — to understand existing patterns.
               Key files: src/index.ts (command registration), src/lib/http.ts (API client
               with retry), src/lib/output.ts (printOutput/printError/confirmAction),
               src/lib/config.ts (ConfigManager).
            3. Identify which existing abstractions the PR should be using.

            ## Phase 3 — Deep Analysis

            Evaluate the diff across these dimensions:

            **Correctness**: Exit code consistency (0=success, 1=runtime error, 2=usage error).
            Commander option handling. Off-by-one in pagination. Null/undefined handling.

            **Security**: Token handling — tokens must never appear in logs, CLI flag values,
            or error messages. Config file must use mode 0600. App secret must come from
            META_ADS_APP_SECRET env var, never a CLI flag. No credentials in committed files.

            **API contract**: Budgets are in minor currency units (paisa for INR, cents for USD).
            --since/--until must be used together or both omitted. List commands return
            {data: [...], has_more} wrapper — jq must use .data[] not .[]. Single-item
            commands return plain objects. Default --limit is 50.

            **Error handling**: Errors use printError() with structured {error, message, hint}
            format. Auto-retry covers HTTP 429 and 5xx with exponential backoff up to 3
            retries. retryAfter header honored on 429.

            **Testing**: New code paths should have vitest tests with nock for API mocking.
            Check edge cases: empty responses, pagination, error responses.

            **CLI UX**: Destructive operations (status changes to PAUSED/DELETED/ARCHIVED)
            must prompt for confirmation interactively and require --force in non-TTY.
            --dry-run support on create/update commands.

            Skip formatting and style nits — eslint handles those automatically.

            ## Phase 4 — Output

            Post inline comments on specific lines, classified by severity:
            - 🔴 **Must fix** — bugs, security vulnerabilities, data loss risks
            - 🟡 **Should fix** — error handling gaps, API contract violations, missing tests
            - 🟢 **Suggestion** — alternative approaches, minor optimizations, readability
            - ❓ **Question** — clarification needed, intent unclear, design choice to discuss

            Post a single top-level summary comment with:
            - One-sentence PR summary
            - Overall assessment
            - Key findings grouped by severity
            - Positive callouts for well-written code

            If no issues are found, say so clearly — do not manufacture feedback.
          claude_args: >-
            --allowedTools "Read,Glob,Grep,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),mcp__github_inline_comment__create_inline_comment"
